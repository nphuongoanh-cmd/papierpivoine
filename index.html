  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

d-a6c3-eb7b64ee44ab\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Albert Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f1ab0ccb-8660-4eb4-b45b-d132c1d843f0\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n@font-face {\n  font-family: 'Aboreto';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"e9e516f6-f898-4871-99fc-b830d5c8b81b\") format('truetype');\n}\n\n@font-face {\n  font-family: 'Albert Sans';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"5d7f734b-2183-4369-b13d-930e317c22d4\") format('truetype');\n}\n<\u002Fstyle>\n  <style>/* Papier Pivoine — Colour palette (locked, Brand Bible §16)\n   Muted and desaturated. Soft pinks for warmth, two greens to ground it.\n   Keep large areas light (white + blush) so printables stay light on ink. */\n\n:root {\n  /* ---- Base palette (the five locked colours) ---- */\n  --blush: #F8E7E1;      /* lightest — page tints, soft backgrounds, card fills, \"paper\" warmth */\n  --pale-rose: #EDC2BE;  /* gentle secondary fills, soft dividers */\n  --sage: #B2BD88;       /* the soft green — hairline rules, small botanical accents */\n  --rose: #C47A78;       /* signature warm accent — the peony, a key word, small emphasis */\n  --deep-olive: #656D44; /* darkest — headings, strong accents, grounding */\n\n  /* ---- Extended neutrals (the \"one gap to fill\": a dark warm text colour) ---- */\n  --paper: #FFFFFF;          /* true page white */\n  --paper-warm: #FCF6F2;     /* faint warm off-white, between white and blush */\n  --ink: #33321E;            /* dark warm olive-charcoal — body text */\n  --ink-soft: #5A5A47;       /* muted secondary text */\n  --ink-faint: #8C8A77;      /* captions, placeholders, disabled */\n\n  /* tints derived from the palette, for subtle states */\n  --blush-deep: #F1D6CD;     /* hover/pressed tint over blush */\n  --rose-deep: #A8615F;      /* pressed state of rose accents */\n  --sage-soft: #D7DDC2;      /* faint sage wash */\n  --olive-soft: #E2E4D6;     /* faint olive wash */\n\n  /* ---- Semantic aliases ---- */\n  --surface-page: var(--paper-warm);\n  --surface-card: var(--paper);\n  --surface-tint: var(--blush);\n  --surface-tint-rose: var(--pale-rose);\n  --surface-tint-sage: var(--sage-soft);\n  --surface-inset: var(--blush);\n\n  --text-heading: var(--deep-olive);\n  --text-body: var(--ink);\n  --text-muted: var(--ink-soft);\n  --text-faint: var(--ink-faint);\n  --text-accent: var(--rose);\n  --text-on-accent: #FFFFFF;\n  --text-on-olive: #FBF8EF;\n\n  --accent: var(--rose);\n  --accent-pressed: var(--rose-deep);\n  --accent-ground: var(--deep-olive);\n\n  --border-hairline: var(--sage);\n  --border-soft: var(--pale-rose);\n  --border-faint: #ECE3DC;       /* near-invisible warm divider */\n  --focus-ring: var(--rose);\n}\n<\u002Fstyle>\n  <style>/* Papier Pivoine — Typography (Brand Bible §16)\n   Aboreto for titles (wordmark, book titles, page titles).\n   Albert Sans for body and everything else.\n   Calm, generous, unhurried. Plenty of line-height, restrained sizes. */\n\n:root {\n  /* ---- Families ---- */\n  --font-display: 'Aboreto', 'Times New Roman', serif;\n  --font-body: 'Albert Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n\n  /* ---- Weights (Albert Sans) ---- */\n  --weight-light: 300;\n  --weight-regular: 400;\n  --weight-medium: 500;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n\n  /* ---- Type scale (rem, calm modular ~1.2) ---- */\n  --text-xs: 0.75rem;    /* 12px — captions, fine print */\n  --text-sm: 0.875rem;   /* 14px — labels, meta */\n  --text-base: 1rem;     /* 16px — body */\n  --text-md: 1.125rem;   /* 18px — comfortable reading body */\n  --text-lg: 1.375rem;   /* 22px — lead paragraphs */\n  --text-xl: 1.75rem;    /* 28px — small headings */\n  --text-2xl: 2.25rem;   /* 36px — page titles */\n  --text-3xl: 3rem;      /* 48px — book titles */\n  --text-4xl: 4rem;      /* 64px — hero / wordmark */\n\n  /* ---- Line heights ---- */\n  --leading-tight: 1.15;   /* display */\n  --leading-snug: 1.35;    /* headings */\n  --leading-normal: 1.6;   /* body */\n  --leading-relaxed: 1.85; /* long passages, letters */\n\n  /* ---- Letter-spacing ---- */\n  --tracking-display: 0.06em;  /* Aboreto breathes with a little spacing */\n  --tracking-wide: 0.14em;     /* small caps labels, eyebrows */\n  --tracking-normal: 0;\n  --tracking-tight: -0.01em;\n}\n<\u002Fstyle>\n  <style>/* Papier Pivoine — Spacing (Brand Bible §16: generous white space)\n   Breathing room is part of the calm. 4px base step. */\n\n:root {\n  --space-0: 0;\n  --space-1: 0.25rem;   /* 4px */\n  --space-2: 0.5rem;    /* 8px */\n  --space-3: 0.75rem;   /* 12px */\n  --space-4: 1rem;      /* 16px */\n  --space-5: 1.5rem;    /* 24px */\n  --space-6: 2rem;      /* 32px */\n  --space-7: 3rem;      /* 48px */\n  --space-8: 4rem;      /* 64px */\n  --space-9: 6rem;      /* 96px */\n  --space-10: 8rem;     /* 128px */\n\n  /* semantic */\n  --gap-inline: var(--space-3);\n  --gap-stack: var(--space-5);\n  --pad-card: var(--space-6);\n  --pad-section: var(--space-9);\n  --measure: 60ch;          /* comfortable reading width */\n  --measure-narrow: 42ch;   /* letters, intimate copy */\n}\n<\u002Fstyle>\n  <style>/* Papier Pivoine — Effects: radii, borders, shadows, motion\n   Matte, tactile, paper-like. Soft, never glossy or neon.\n   Shadows are warm-tinted and very low: paper resting on paper. */\n\n:root {\n  /* ---- Corner radii (gentle, never sharp, never pill-everywhere) ---- */\n  --radius-xs: 4px;\n  --radius-sm: 8px;\n  --radius-md: 14px;    /* cards */\n  --radius-lg: 22px;    /* large surfaces, sheets */\n  --radius-pill: 999px; /* tags, small buttons */\n\n  /* ---- Borders ---- */\n  --border-width: 1px;\n  --border-hairline-style: 1px solid var(--border-hairline);\n  --border-soft-style: 1px solid var(--border-soft);\n  --border-faint-style: 1px solid var(--border-faint);\n\n  /* ---- Shadows — warm, soft, low. Built from olive/rose, never grey-blue ---- */\n  --shadow-none: none;\n  --shadow-xs: 0 1px 2px rgba(101, 109, 68, 0.06);\n  --shadow-sm: 0 2px 8px rgba(101, 109, 68, 0.07);\n  --shadow-md: 0 6px 20px rgba(101, 109, 68, 0.09);\n  --shadow-lg: 0 14px 40px rgba(101, 109, 68, 0.12);\n  /* soft inner press for inputs / inset paper */\n  --shadow-inset: inset 0 1px 2px rgba(101, 109, 68, 0.08);\n\n  /* ---- Motion — unhurried. Gentle fades, no bounce, no spring ---- */\n  --ease-soft: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --ease-out: cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --dur-fast: 140ms;  /* @kind other */\n  --dur-base: 240ms;  /* @kind other */\n  --dur-slow: 420ms;  /* @kind other */\n  --transition-base: all var(--dur-base) var(--ease-soft);\n}\n<\u002Fstyle>\n  <style>/* Papier Pivoine — Base element defaults\n   Applied lightly so specimen cards and kits inherit the calm baseline. */\n\n* { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  font-weight: var(--weight-regular);\n  font-size: var(--text-md);\n  line-height: var(--leading-normal);\n  color: var(--text-body);\n  background: var(--surface-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  font-weight: var(--weight-regular);\n  color: var(--text-heading);\n  line-height: var(--leading-snug);\n  letter-spacing: var(--tracking-display);\n  margin: 0 0 var(--space-4);\n  text-wrap: balance;\n}\n\np { margin: 0 0 var(--space-4); text-wrap: pretty; }\n\na { color: var(--text-accent); text-decoration: none; }\na:hover { color: var(--accent-pressed); }\n\n/* Small caps eyebrow label — recurring brand device */\n.pp-eyebrow {\n  font-family: var(--font-body);\n  font-weight: var(--weight-medium);\n  font-size: var(--text-xs);\n  letter-spacing: var(--tracking-wide);\n  text-transform: uppercase;\n  color: var(--text-muted);\n}\n<\u002Fstyle>\n  <style>/* Papier Pivoine — Design System\n   Global entry point. Consumers link this one file.\n   Keep this as @import lines only. */\n\n/* Papier Pivoine — Webfonts\n   Aboreto: display / titles (single weight by design).\n   Albert Sans: body & UI. Local binary is weight 400; additional weights\n   are pulled from Google Fonts so headings/buttons have proper medium &\n   semibold. If you need the extra weights fully self-hosted, add the\n   weighted .ttf files and matching @font-face rules. */\n\n/* latin-ext */\n@font-face {\n  font-family: 'Albert Sans';\n  font-style: normal;\n  font-weight: 300;\n  font-display: swap;\n  src: url(\"335ff036-1d9f-4f5d-a6c3-eb7b64ee44ab\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Albert Sans';\n  font-style: normal;\n  font-weight: 300;\n  font-display: swap;\n  src: url(\"f1ab0ccb-8660-4eb4-b45b-d132c1d843f0\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Albert Sans';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"335ff036-1d9f-4f5d-a6c3-eb7b64ee44ab\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02D , U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Albert Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"335ff036-1d9f-4f5d-a6c3-eb7b64ee44ab\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Albert Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f1ab0ccb-8660-4eb4-b45b-d132c1d843f0\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n@font-face {\n  font-family: 'Aboreto';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"e9e516f6-f898-4871-99fc-b830d5c8b81b\") format('truetype');\n}\n\n@font-face {\n  font-family: 'Albert Sans';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"5d7f734b-2183-4369-b13d-930e317c22d4\") format('truetype');\n}\n\n/* Papier Pivoine — Colour palette (locked, Brand Bible §16)\n   Muted and desaturated. Soft pinks for warmth, two greens to ground it.\n   Keep large areas light (white + blush) so printables stay light on ink. */\n\n:root {\n  /* ---- Base palette (the five locked colours) ---- */\n  --blush: #F8E7E1;      /* lightest — page tints, soft backgrounds, card fills, \"paper\" warmth */\n  --pale-rose: #EDC2BE;  /* gentle secondary fills, soft dividers */\n  --sage: #B2BD88;       /* the soft green — hairline rules, small botanical accents */\n  --rose: #C47A78;       /* signature warm accent — the peony, a key word, small emphasis */\n  --deep-olive: #656D44; /* darkest — headings, strong accents, grounding */\n\n  /* ---- Extended neutrals (the \"one gap to fill\": a dark warm text colour) ---- */\n  --paper: #FFFFFF;          /* true page white */\n  --paper-warm: #FCF6F2;     /* faint warm off-white, between white and blush */\n  --ink: #33321E;            /* dark warm olive-charcoal — body text */\n  --ink-soft: #5A5A47;       /* muted secondary text */\n  --ink-faint: #8C8A77;      /* captions, placeholders, disabled */\n\n  /* tints derived from the palette, for subtle states */\n  --blush-deep: #F1D6CD;     /* hover/pressed tint over blush */\n  --rose-deep: #A8615F;      /* pressed state of rose accents */\n  --sage-soft: #D7DDC2;      /* faint sage wash */\n  --olive-soft: #E2E4D6;     /* faint olive wash */\n\n  /* ---- Semantic aliases ---- */\n  --surface-page: var(--paper-warm);\n  --surface-card: var(--paper);\n  --surface-tint: var(--blush);\n  --surface-tint-rose: var(--pale-rose);\n  --surface-tint-sage: var(--sage-soft);\n  --surface-inset: var(--blush);\n\n  --text-heading: var(--deep-olive);\n  --text-body: var(--ink);\n  --text-muted: var(--ink-soft);\n  --text-faint: var(--ink-faint);\n  --text-accent: var(--rose);\n  --text-on-accent: #FFFFFF;\n  --text-on-olive: #FBF8EF;\n\n  --accent: var(--rose);\n  --accent-pressed: var(--rose-deep);\n  --accent-ground: var(--deep-olive);\n\n  --border-hairline: var(--sage);\n  --border-soft: var(--pale-rose);\n  --border-faint: #ECE3DC;       /* near-invisible warm divider */\n  --focus-ring: var(--rose);\n}\n\n/* Papier Pivoine — Typography (Brand Bible §16)\n   Aboreto for titles (wordmark, book titles, page titles).\n   Albert Sans for body and everything else.\n   Calm, generous, unhurried. Plenty of line-height, restrained sizes. */\n\n:root {\n  /* ---- Families ---- */\n  --font-display: 'Aboreto', 'Times New Roman', serif;\n  --font-body: 'Albert Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n\n  /* ---- Weights (Albert Sans) ---- */\n  --weight-light: 300;\n  --weight-regular: 400;\n  --weight-medium: 500;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n\n  /* ---- Type scale (rem, calm modular ~1.2) ---- */\n  --text-xs: 0.75rem;    /* 12px — captions, fine print */\n  --text-sm: 0.875rem;   /* 14px — labels, meta */\n  --text-base: 1rem;     /* 16px — body */\n  --text-md: 1.125rem;   /* 18px — comfortable reading body */\n  --text-lg: 1.375rem;   /* 22px — lead paragraphs */\n  --text-xl: 1.75rem;    /* 28px — small headings */\n  --text-2xl: 2.25rem;   /* 36px — page titles */\n  --text-3xl: 3rem;      /* 48px — book titles */\n  --text-4xl: 4rem;      /* 64px — hero / wordmark */\n\n  /* ---- Line heights ---- */\n  --leading-tight: 1.15;   /* display */\n  --leading-snug: 1.35;    /* headings */\n  --leading-normal: 1.6;   /* body */\n  --leading-relaxed: 1.85; /* long passages, letters */\n\n  /* ---- Letter-spacing ---- */\n  --tracking-display: 0.06em;  /* Aboreto breathes with a little spacing */\n  --tracking-wide: 0.14em;     /* small caps labels, eyebrows */\n  --tracking-normal: 0;\n  --tracking-tight: -0.01em;\n}\n\n/* Papier Pivoine — Spacing (Brand Bible §16: generous white space)\n   Breathing room is part of the calm. 4px base step. */\n\n:root {\n  --space-0: 0;\n  --space-1: 0.25rem;   /* 4px */\n  --space-2: 0.5rem;    /* 8px */\n  --space-3: 0.75rem;   /* 12px */\n  --space-4: 1rem;      /* 16px */\n  --space-5: 1.5rem;    /* 24px */\n  --space-6: 2rem;      /* 32px */\n  --space-7: 3rem;      /* 48px */\n  --space-8: 4rem;      /* 64px */\n  --space-9: 6rem;      /* 96px */\n  --space-10: 8rem;     /* 128px */\n\n  /* semantic */\n  --gap-inline: var(--space-3);\n  --gap-stack: var(--space-5);\n  --pad-card: var(--space-6);\n  --pad-section: var(--space-9);\n  --measure: 60ch;          /* comfortable reading width */\n  --measure-narrow: 42ch;   /* letters, intimate copy */\n}\n\n/* Papier Pivoine — Effects: radii, borders, shadows, motion\n   Matte, tactile, paper-like. Soft, never glossy or neon.\n   Shadows are warm-tinted and very low: paper resting on paper. */\n\n:root {\n  /* ---- Corner radii (gentle, never sharp, never pill-everywhere) ---- */\n  --radius-xs: 4px;\n  --radius-sm: 8px;\n  --radius-md: 14px;    /* cards */\n  --radius-lg: 22px;    /* large surfaces, sheets */\n  --radius-pill: 999px; /* tags, small buttons */\n\n  /* ---- Borders ---- */\n  --border-width: 1px;\n  --border-hairline-style: 1px solid var(--border-hairline);\n  --border-soft-style: 1px solid var(--border-soft);\n  --border-faint-style: 1px solid var(--border-faint);\n\n  /* ---- Shadows — warm, soft, low. Built from olive/rose, never grey-blue ---- */\n  --shadow-none: none;\n  --shadow-xs: 0 1px 2px rgba(101, 109, 68, 0.06);\n  --shadow-sm: 0 2px 8px rgba(101, 109, 68, 0.07);\n  --shadow-md: 0 6px 20px rgba(101, 109, 68, 0.09);\n  --shadow-lg: 0 14px 40px rgba(101, 109, 68, 0.12);\n  /* soft inner press for inputs / inset paper */\n  --shadow-inset: inset 0 1px 2px rgba(101, 109, 68, 0.08);\n\n  /* ---- Motion — unhurried. Gentle fades, no bounce, no spring ---- */\n  --ease-soft: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --ease-out: cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --dur-fast: 140ms;  /* @kind other */\n  --dur-base: 240ms;  /* @kind other */\n  --dur-slow: 420ms;  /* @kind other */\n  --transition-base: all var(--dur-base) var(--ease-soft);\n}\n\n/* Papier Pivoine — Base element defaults\n   Applied lightly so specimen cards and kits inherit the calm baseline. */\n\n* { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  font-weight: var(--weight-regular);\n  font-size: var(--text-md);\n  line-height: var(--leading-normal);\n  color: var(--text-body);\n  background: var(--surface-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  font-weight: var(--weight-regular);\n  color: var(--text-heading);\n  line-height: var(--leading-snug);\n  letter-spacing: var(--tracking-display);\n  margin: 0 0 var(--space-4);\n  text-wrap: balance;\n}\n\np { margin: 0 0 var(--space-4); text-wrap: pretty; }\n\na { color: var(--text-accent); text-decoration: none; }\na:hover { color: var(--accent-pressed); }\n\n/* Small caps eyebrow label — recurring brand device */\n.pp-eyebrow {\n  font-family: var(--font-body);\n  font-weight: var(--weight-medium);\n  font-size: var(--text-xs);\n  letter-spacing: var(--tracking-wide);\n  text-transform: uppercase;\n  color: var(--text-muted);\n}\n\n<\u002Fstyle>\n  <script src=\"f38a8ac4-ae23-4bcf-897a-225b9634b8c5\"><\u002Fscript>\n  <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n  <link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"anonymous\">\n  <style>/* vietnamese */\n@font-face {\n  font-family: 'Allison';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"94fcca1b-317f-4281-b376-823c8635e22c\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Allison';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"2ebd9fd1-dc1c-4a47-b763-bcf9478cb5ce\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Allison';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"4f5b5e9f-7b4f-4478-b83e-3a5727e57394\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <script async=\"\" data-uid=\"27c8b8373b\" src=\"https://camelianguyen.kit.com/27c8b8373b/index.js\"><\u002Fscript>\n  <style>\n    body { margin: 0; background: var(--paper-warm, #FCF6F2); }\n    a { color: var(--rose); }\n    a:hover { color: var(--rose-deep); }\n    ::selection { background: var(--blush); }\n    /* Pop-up Kit : autoriser le défilement sur mobile (leur fenêtre dépasse l'écran) */\n    @media (max-width: 700px) {\n      .formkit-overlay, .formkit-modal { overflow-y: auto !important; -webkit-overflow-scrolling: touch !important; align-items: flex-start !important; }\n      .formkit-modal { max-height: 100dvh !important; }\n      .formkit-modal .formkit-form, .formkit-modal > div { max-height: none !important; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;display:flex;flex-direction:column;background:var(--paper-warm)\">\n\n  <!-- ═══════════ HEADER ═══════════ -->\n  <header style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px 24px;padding:18px min(48px,5vw);border-bottom:1px solid var(--border-faint);background:var(--paper-warm);position:sticky;top:0;z-index:10\">\n    <span sc-camel-on-click=\"{{ goAccueil }}\" style=\"cursor:pointer;font-family:var(--font-display);font-size:22px;color:var(--deep-olive);letter-spacing:0.06em\">Papier Pivoine<\u002Fspan>\n    <nav style=\"display:flex;gap:6px 24px;align-items:center;flex-wrap:wrap\">\n      <span sc-camel-on-click=\"{{ goAccueil }}\" style=\"cursor:pointer;font-family:var(--font-body);font-size:14px;padding:4px 0;color:{{ navCAccueil }};border-bottom:1px solid {{ navUAccueil }}\">Accueil<\u002Fspan>\n      <span sc-camel-on-click=\"{{ goEcriture }}\" style=\"cursor:pointer;font-family:var(--font-body);font-size:14px;padding:4px 0;color:{{ navCEcriture }};border-bottom:1px solid {{ navUEcriture }}\">Carnets d'écriture<\u002Fspan>\n      <span sc-camel-on-click=\"{{ goActivites }}\" style=\"cursor:pointer;font-family:var(--font-body);font-size:14px;padding:4px 0;color:{{ navCActivites }};border-bottom:1px solid {{ navUActivites }}\">Carnets d'activités<\u002Fspan>\n      <span sc-camel-on-click=\"{{ goMethode }}\" style=\"cursor:pointer;font-family:var(--font-body);font-size:14px;padding:4px 0;color:{{ navCMethode }};border-bottom:1px solid {{ navUMethode }}\">La méthode<\u002Fspan>\n      <span sc-camel-on-click=\"{{ goApropos }}\" style=\"cursor:pointer;font-family:var(--font-body);font-size:14px;padding:4px 0;color:{{ navCApropos }};border-bottom:1px solid {{ navUApropos }}\">À propos<\u002Fspan>\n      <span sc-camel-on-click=\"{{ goBlog }}\" style=\"cursor:pointer;font-family:var(--font-body);font-size:14px;padding:4px 0;color:{{ navCBlog }};border-bottom:1px solid {{ navUBlog }}\">Le blog<\u002Fspan>\n      <span sc-camel-on-click=\"{{ goNewsletter }}\" style=\"cursor:pointer;font-family:var(--font-body);font-size:14px;padding:4px 0;color:{{ navCNewsletter }};border-bottom:1px solid {{ navUNewsletter }}\">La newsletter<\u002Fspan>\n    <\u002Fnav>\n  <\u002Fheader>\n\n  <main style=\"flex:1\">\n\n    <!-- ═══════════ ACCUEIL ═══════════ -->\n    <sc-if value=\"{{ isAccueil }}\" hint-placeholder-val=\"{{ true }}\">\n      <div data-screen-label=\"Accueil\">\n\n        <div style=\"padding:clamp(64px,10vw,104px) min(48px,5vw) 84px;display:flex;flex-direction:column;align-items:center;text-align:center\">\n          <svg width=\"34\" height=\"34\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--rose)\" stroke-width=\"1\" opacity=\"0.55\" aria-hidden=\"true\" style=\"margin-bottom:22px\"><path d=\"M12 3c2.5 1.5 3 4 2 6 2-1 4 0 4.5 2 .5 2-1 4-3.5 4.5 1.5 1 1.5 3 .5 4.5-1.2 1.8-4 1.8-6 0-2 1.8-4.8 1.8-6 0-1-1.5-1-3.5.5-4.5C1.5 15 0 13 .5 11 1 9 3 8 5 9c-1-2-.5-4.5 2-6 1.6-1 3.4-1 5 0Z\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"2.4\"><\u002Fcircle><\u002Fsvg>\n          <div class=\"pp-eyebrow\" style=\"margin-bottom:22px\">Un moment à toi<\u002Fdiv>\n          <h1 style=\"font-family:var(--font-display);font-weight:400;font-size:clamp(32px,6vw,48px);line-height:1.14;letter-spacing:0.04em;color:var(--deep-olive);max-width:21ch;margin:0 0 26px\">Un endroit calme pour déposer ce que tu portes.<\u002Fh1>\n          <p style=\"font-family:var(--font-body);font-size:clamp(17px,2.6vw,21px);color:var(--ink-soft);line-height:1.7;max-width:44ch;margin:0 0 40px\">Des carnets d'écriture et d'activités douces, pensés pour les femmes hypersensibles et introverties. Pour les soirs où la tête est pleine, comme pour les moments que tu t'offres. Ici, rien ne presse.<\u002Fp>\n          <div style=\"display:flex;gap:14px;align-items:center;justify-content:center;flex-wrap:wrap\">\n            <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Button\" variant=\"primary\" size=\"lg\" sc-camel-on-click=\"{{ goNewsletter }}\" hint-size=\"230px,52px\">Recevoir la newsletter<\u002Fx-import>\n            <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Button\" variant=\"secondary\" size=\"lg\" sc-camel-on-click=\"{{ goEcriture }}\" hint-size=\"180px,52px\">Voir les carnets<\u002Fx-import>\n          <\u002Fdiv>\n          <p style=\"font-family:var(--font-body);font-size:12px;color:var(--ink-faint);margin:14px 0 0\">C'est gratuit. Tu peux te désinscrire quand tu veux.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--paper);border-top:1px solid var(--border-faint);border-bottom:1px solid var(--border-faint);padding:84px min(48px,5vw);display:flex;justify-content:center\">\n          <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.LetterBlock\" align=\"center\" signature=\"\" hint-size=\"620px,360px\">\n            <p style=\"margin:0 0 1.2em\">Bonjour, et bienvenue. Je suis contente que tu sois là.<\u002Fp>\n            <p style=\"margin:0 0 1.2em\">Je m'appelle Camélia. J'ai fait ces carnets pour les moments où j'avais besoin de me poser : les soirées où ma tête débordait, mais aussi les après-midi tranquilles, juste pour le plaisir. C'est un endroit calme pour déposer ce que tu portes, ou simplement t'offrir une pause.<\u002Fp>\n            <p style=\"margin:0\">Prends ton temps. Regarde ce qui te fait envie, et laisse le reste.<\u002Fp>\n            <div style=\"margin-top:22px;font-family:'Allison',cursive;font-size:34px;line-height:1.1;color:var(--rose)\">Camélia<\u002Fdiv>\n          <\u002Fx-import>\n        <\u002Fdiv>\n\n        <div style=\"padding:84px min(48px,5vw)\">\n          <div style=\"max-width:1180px;margin:0 auto\">\n            <div class=\"pp-eyebrow\" style=\"display:block;text-align:center;margin-bottom:44px\">Ce qu'elles en disent<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:28px;align-items:start\">\n              <div style=\"background:var(--paper);border:1px solid var(--border-faint);border-radius:14px;padding:28px 30px\">\n                <div style=\"font-size:14px;letter-spacing:0.08em;margin-bottom:12px\">⭐️⭐️⭐️⭐️⭐️<\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.7;margin:0 0 16px\">Je trouve que cette template peut être une ressource pour travailler entre les séances, pour aller vers une autonomisation dans la gestion et l'expression des émotions, tout en construisant la confiance en soi.<\u002Fp>\n                <div style=\"font-family:var(--font-body);font-size:13px;color:var(--rose-deep)\">Manon · Psychologue pour enfants et adolescents<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:var(--paper);border:1px solid var(--border-faint);border-radius:14px;padding:28px 30px\">\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.7;margin:0 0 16px\">J'ai rempli plusieurs pages, sans être pressée par le temps. Je suis à l'après de l'exercice du Jour 1 et je me sens assez soulagée, calme, et je ne pensais pas porter tout ça. Je suis surprise que mes pensées soient si positives, moi qui pensais qu'elles étaient plus négatives qu'autre chose. J'adore écrire et cet exercice est parfait pour moi, c'est une routine que je veux intégrer à mon quotidien. Merci pour cette initiative, j'ai beaucoup apprécié ce moment.<\u002Fp>\n                <div style=\"font-family:var(--font-body);font-size:13px;color:var(--rose-deep)\">Anne-Sophie<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:var(--paper);border:1px solid var(--border-faint);border-radius:14px;padding:28px 30px\">\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.7;margin:0 0 10px\">⭐️⭐️⭐️⭐️⭐️ Super utile et transformateur !<\u002Fp>\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.7;margin:0 0 10px\">💬 Très utile, j'ai ressenti un vrai changement.<\u002Fp>\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.7;margin:0 0 16px\">💌 Merci de tes conseils, j'ai essayé et cela a fonctionné.<\u002Fp>\n                <div style=\"font-family:var(--font-body);font-size:13px;color:var(--rose-deep)\">Anonymes<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--paper);border-top:1px solid var(--border-faint);padding:84px min(48px,5vw)\">\n          <div style=\"max-width:1180px;margin:0 auto\">\n            <h2 style=\"font-family:var(--font-display);font-weight:400;font-size:32px;letter-spacing:0.04em;color:var(--deep-olive);text-align:center;margin:0 0 14px\">Les carnets<\u002Fh2>\n            <p style=\"font-family:var(--font-body);font-size:16px;color:var(--ink-soft);text-align:center;line-height:1.6;max-width:62ch;margin:0 auto 52px\">Deux formes, la même intention : prendre soin de ta tête et de ton cœur, sans rien exiger de toi. Chaque carnet existe en PDF à imprimer chez toi, et en livre broché sur Amazon.<\u002Fp>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:40px\">\n\n              <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Card\" padded=\"{{ false }}\" interactive=\"{{ true }}\" sc-camel-on-click=\"{{ goEcriture }}\" hint-size=\"100%,560px\">\n                <div style=\"height:330px;background:var(--blush);display:flex;align-items:center;justify-content:center\">\n                  <img src=\"1eff886e-a763-4fd6-9ac1-fcd27433a38e\" alt=\"Couverture : Quand ma tête est pleine\" style=\"display:block;height:276px;width:auto;border-radius:6px;border:1px solid var(--border-faint);box-shadow:0 14px 28px rgba(101,109,68,0.18)\">\n                <\u002Fdiv>\n                <div style=\"padding:28px 30px 30px\">\n                  <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Tag\" tone=\"rose\" hint-size=\"130px,26px\">Carnets d'écriture<\u002Fx-import>\n                  <h3 style=\"font-family:var(--font-display);font-weight:400;font-size:24px;letter-spacing:0.04em;color:var(--deep-olive);margin:14px 0 10px\">Quand ma tête est pleine<\u002Fh3>\n                  <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.65;margin:0 0 18px\">Un carnet d'écriture pour apaiser un esprit qui pense trop. Le premier de la série : d'autres suivront, doucement.<\u002Fp>\n                  <sc-if value=\"{{ showPrices }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div style=\"display:flex;align-items:baseline;gap:12px\">\n                      <span style=\"font-family:var(--font-body);font-size:17px;font-weight:600;color:var(--ink)\">12&nbsp;€<\u002Fspan>\n                      <span style=\"font-family:var(--font-body);font-size:13px;color:var(--ink-faint)\">PDF à imprimer ou broché<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fx-import>\n\n              <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Card\" padded=\"{{ false }}\" interactive=\"{{ true }}\" sc-camel-on-click=\"{{ goActivites }}\" hint-size=\"100%,560px\">\n                <div style=\"height:330px;background:var(--sage-soft);display:flex;align-items:center;justify-content:center\">\n                  <img src=\"c28b3d80-61dd-49da-9fac-a18bcda1572e\" alt=\"Couverture : Un été à s'émerveiller\" style=\"display:block;height:276px;width:auto;border-radius:6px;border:1px solid var(--border-faint);box-shadow:0 14px 28px rgba(101,109,68,0.18)\">\n                <\u002Fdiv>\n                <div style=\"padding:28px 30px 30px\">\n                  <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Tag\" tone=\"sage\" hint-size=\"130px,26px\">Carnets d'activités<\u002Fx-import>\n                  <h3 style=\"font-family:var(--font-display);font-weight:400;font-size:24px;letter-spacing:0.04em;color:var(--deep-olive);margin:14px 0 10px\">Un été à s'émerveiller<\u002Fh3>\n                  <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.65;margin:0 0 18px\">Coloriage, écritures guidées, puzzles et jeux, dans un seul carnet. De quoi te poser cinq minutes ou une heure entière.<\u002Fp>\n                  <sc-if value=\"{{ showPrices }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div style=\"display:flex;align-items:baseline;gap:12px\">\n                      <span style=\"font-family:var(--font-body);font-size:17px;font-weight:600;color:var(--ink)\">12&nbsp;€<\u002Fspan>\n                      <span style=\"font-family:var(--font-body);font-size:13px;color:var(--ink-faint)\">PDF à imprimer ou broché · d'autres saisons arrivent doucement<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fx-import>\n\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:84px min(48px,5vw);text-align:center\">\n          <div class=\"pp-eyebrow\" style=\"margin-bottom:18px\">La méthode pivoine<\u002Fdiv>\n          <p style=\"font-family:var(--font-display);font-size:28px;color:var(--deep-olive);letter-spacing:0.04em;line-height:1.4;max-width:24ch;margin:0 auto 36px\">Sept petites permissions. Jamais une liste à cocher.<\u002Fp>\n          <div style=\"display:flex;justify-content:center;margin-bottom:30px\">\n            <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.PivoineBadge\" variant=\"strip\" hint-size=\"560px,64px\"><\u002Fx-import>\n          <\u002Fdiv>\n          <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Button\" variant=\"ghost\" size=\"md\" sc-camel-on-click=\"{{ goMethode }}\" hint-size=\"200px,44px\">Découvrir la méthode<\u002Fx-import>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ═══════════ CARNETS D'ÉCRITURE ═══════════ -->\n    <sc-if value=\"{{ isEcriture }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Carnets d'écriture\">\n\n        <div style=\"padding:clamp(56px,9vw,88px) min(48px,5vw) 64px;text-align:center\">\n          <div class=\"pp-eyebrow\" style=\"margin-bottom:20px\">Écrire pour se sentir mieux<\u002Fdiv>\n          <h1 style=\"font-family:var(--font-display);font-weight:400;font-size:clamp(30px,5.5vw,42px);line-height:1.16;letter-spacing:0.04em;color:var(--deep-olive);max-width:24ch;margin:0 auto 22px\">Les carnets d'écriture<\u002Fh1>\n          <p style=\"font-family:var(--font-body);font-size:clamp(16px,2.4vw,19px);color:var(--ink-soft);line-height:1.7;max-width:52ch;margin:0 auto\">Des carnets guidés pour mettre des mots sur ce qui t'occupe, en listes désordonnées ou en longues lettres, comme ça vient. Chaque carnet existe en PDF à imprimer chez toi, et en livre broché sur Amazon.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--paper);border-top:1px solid var(--border-faint);border-bottom:1px solid var(--border-faint);padding:76px min(48px,5vw)\">\n          <div style=\"max-width:1180px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:min(64px,6vw);align-items:center\">\n            <div style=\"background:var(--blush);border-radius:14px;height:440px;display:flex;align-items:center;justify-content:center\">\n              <img src=\"1eff886e-a763-4fd6-9ac1-fcd27433a38e\" alt=\"Couverture : Quand ma tête est pleine\" style=\"display:block;height:368px;width:auto;border-radius:6px;border:1px solid var(--border-faint);box-shadow:0 16px 32px rgba(101,109,68,0.2)\">\n            <\u002Fdiv>\n            <div>\n              <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Tag\" tone=\"rose\" hint-size=\"140px,26px\">Le premier carnet<\u002Fx-import>\n              <h2 style=\"font-family:var(--font-display);font-weight:400;font-size:clamp(28px,4.5vw,36px);letter-spacing:0.04em;color:var(--deep-olive);margin:16px 0 8px\">Quand ma tête est pleine<\u002Fh2>\n              <p style=\"font-family:var(--font-body);font-size:15px;font-style:italic;color:var(--rose-deep);margin:0 0 18px\">Un carnet d'écriture pour apaiser un esprit qui pense trop · Pour femmes hypersensibles et introverties<\u002Fp>\n              <p style=\"font-family:var(--font-body);font-size:16px;color:var(--ink-soft);line-height:1.7;max-width:52ch;margin:0 0 14px\">Tu rejoues les conversations, longtemps après. Tu remarques tout, le moindre détail, la moindre tension. Le soir, tu rentres vidée, sans toujours savoir pourquoi. Et la nuit, ton esprit tourne, encore, pendant que tu voudrais juste dormir.<\u002Fp>\n              <p style=\"font-family:var(--font-body);font-size:16px;color:var(--ink);font-weight:500;line-height:1.7;max-width:52ch;margin:0 0 24px\">Si tu te reconnais, ce carnet est pour toi.<\u002Fp>\n              <sc-if value=\"{{ showPrices }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:22px\">\n                  <span style=\"font-family:var(--font-body);font-size:20px;font-weight:600;color:var(--ink)\">12&nbsp;€<\u002Fspan>\n                  <span style=\"font-family:var(--font-body);font-size:13px;color:var(--ink-faint)\">PDF à imprimer · broché sur Amazon<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"display:flex;gap:12px;align-items:center;flex-wrap:wrap\">\n                <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Button\" variant=\"primary\" size=\"md\" sc-camel-on-click=\"{{ buyTetePdf }}\" hint-size=\"190px,46px\">Télécharger le PDF<\u002Fx-import>\n                <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Button\" variant=\"secondary\" size=\"md\" sc-camel-on-click=\"{{ buyTeteAmazon }}\" hint-size=\"230px,46px\">Voir la version brochée sur Amazon<\u002Fx-import>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:76px min(48px,5vw)\">\n          <div style=\"max-width:1080px;margin:0 auto\">\n            <p style=\"font-family:var(--font-body);font-size:17px;color:var(--ink-soft);line-height:1.8;max-width:56ch;margin:0 auto 18px;text-align:center\">Quand ma tête est pleine est un carnet d'écriture pensé pour les femmes hypersensibles et introverties, celles dont l'esprit ressent fort et ne se repose jamais. C'est un endroit calme, privé, où poser une tête trop pleine, quand tu en as besoin.<\u002Fp>\n            <p style=\"font-family:var(--font-body);font-size:17px;color:var(--ink-soft);line-height:1.8;max-width:56ch;margin:0 auto 64px;text-align:center\">Ce n'est pas une méthode pour penser moins, ni un programme pour devenir une meilleure version de toi-même. Ton esprit travaille beaucoup parce que tu ressens et remarques tout. Ce n'est pas un défaut. Ce carnet ne cherche pas à te corriger. Il donne simplement à ton esprit fatigué un endroit où se déposer, et te laisse voir ce qui s'apaise.<\u002Fp>\n            <h2 style=\"font-family:var(--font-display);font-weight:400;font-size:28px;letter-spacing:0.04em;color:var(--deep-olive);text-align:center;margin:0 0 44px\">Sur chaque page, tu trouveras<\u002Fh2>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:40px\">\n              <div style=\"border-top:1px solid var(--sage);padding-top:20px\">\n                <div style=\"font-family:var(--font-body);font-size:16px;font-weight:500;color:var(--deep-olive);margin-bottom:8px\">Une question douce<\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.65;margin:0\">Pour t'aider à commencer, quand la page blanche fait peur.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"border-top:1px solid var(--sage);padding-top:20px\">\n                <div style=\"font-family:var(--font-body);font-size:16px;font-weight:500;color:var(--deep-olive);margin-bottom:8px\">De la place pour écrire comme ça vient<\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.65;margin:0\">En vrac, sans soigner les phrases.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"border-top:1px solid var(--sage);padding-top:20px\">\n                <div style=\"font-family:var(--font-body);font-size:16px;font-weight:500;color:var(--deep-olive);margin-bottom:8px\">Une petite ligne, à la fin<\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.65;margin:0\">Pour remarquer ce qui a changé, même un peu.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--paper);border-top:1px solid var(--border-faint);border-bottom:1px solid var(--border-faint);padding:76px min(48px,5vw)\">\n          <div style=\"max-width:560px;margin:0 auto 56px\">\n            <h2 style=\"font-family:var(--font-display);font-weight:400;font-size:28px;letter-spacing:0.04em;color:var(--deep-olive);text-align:center;margin:0 0 40px\">Un carnet fait pour une tête qui pense trop<\u002Fh2>\n            <div style=\"display:flex;flex-direction:column\">\n              <div style=\"padding:20px 0;border-top:1px solid var(--border-faint)\">\n                <div style=\"font-family:var(--font-body);font-size:16px;font-weight:500;color:var(--deep-olive);margin-bottom:6px\">Des pages non datées<\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.65;margin:0\">Pour l'ouvrir quand tu veux, sans jamais être en retard.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"padding:20px 0;border-top:1px solid var(--border-faint)\">\n                <div style=\"font-family:var(--font-body);font-size:16px;font-weight:500;color:var(--deep-olive);margin-bottom:6px\">Des questions qui suivent ce qui t'encombre<\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.65;margin:0\">Les pensées qui tournent, les nuits sans sommeil, la charge mentale, le trop-plein du jour.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"padding:20px 0;border-top:1px solid var(--border-faint)\">\n                <div style=\"font-family:var(--font-body);font-size:16px;font-weight:500;color:var(--deep-olive);margin-bottom:6px\">Quelques lettres, en chemin<\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.65;margin:0\">D'une femme qui connaît ces nuits-là.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"padding:20px 0;border-top:1px solid var(--border-faint);border-bottom:1px solid var(--border-faint)\">\n                <div style=\"font-family:var(--font-body);font-size:16px;font-weight:500;color:var(--deep-olive);margin-bottom:6px\">De la place, beaucoup<\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.65;margin:0\">Parce que le calme commence là.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"max-width:56ch;margin:0 auto;text-align:center\">\n            <p style=\"font-family:var(--font-body);font-size:16px;color:var(--ink-soft);line-height:1.75;margin:0 0 14px\">Tu peux l'ouvrir trois minutes ou une heure. Le matin, le soir, au milieu de la nuit. Tu écris ce que tu veux, comme tu veux. Personne ne lira ça. C'est à toi.<\u002Fp>\n            <p style=\"font-family:var(--font-body);font-size:16px;color:var(--ink-soft);line-height:1.75;margin:0 0 26px\">Il n'y a rien à réussir ici. Tu viens, tu poses ce que tu portes, et tu repars un peu plus légère. Ou pas, et c'est bien aussi.<\u002Fp>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:76px min(48px,5vw) 84px\">\n          <div style=\"max-width:720px;margin:0 auto;background:var(--paper);border:1px solid var(--border-faint);border-radius:14px;padding:44px 48px;text-align:center\">\n            <div class=\"pp-eyebrow\" style=\"margin-bottom:14px\">À venir<\u002Fdiv>\n            <p style=\"font-family:var(--font-body);font-size:16px;color:var(--ink-soft);line-height:1.7;max-width:44ch;margin:0 auto 22px\">Le deuxième carnet est en cours d'écriture. Si tu veux savoir quand il arrive, la newsletter l'annoncera en premier.<\u002Fp>\n            <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Button\" variant=\"ghost\" size=\"md\" sc-camel-on-click=\"{{ goNewsletter }}\" hint-size=\"210px,44px\">Recevoir la newsletter<\u002Fx-import>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ═══════════ CARNETS D'ACTIVITÉS ═══════════ -->\n    <sc-if value=\"{{ isActivites }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Carnets d'activités\">\n\n        <div style=\"padding:clamp(56px,9vw,88px) min(48px,5vw) 64px;text-align:center\">\n          <div class=\"pp-eyebrow\" style=\"margin-bottom:20px\">Se détendre<\u002Fdiv>\n          <h1 style=\"font-family:var(--font-display);font-weight:400;font-size:clamp(30px,5.5vw,42px);line-height:1.16;letter-spacing:0.04em;color:var(--deep-olive);max-width:24ch;margin:0 auto 22px\">Les carnets d'activités<\u002Fh1>\n          <p style=\"font-family:var(--font-body);font-size:clamp(16px,2.4vw,19px);color:var(--ink-soft);line-height:1.7;max-width:52ch;margin:0 auto\">Coloriage, écritures guidées, puzzles, jeux de mots et petits tests, au fil des saisons. De quoi te poser cinq minutes ou une heure entière. Chaque carnet existe en PDF à imprimer chez toi, et en livre broché sur Amazon.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--paper);border-top:1px solid var(--border-faint);border-bottom:1px solid var(--border-faint);padding:76px min(48px,5vw)\">\n          <div style=\"max-width:1180px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:min(64px,6vw);align-items:center\">\n            <div style=\"background:var(--sage-soft);border-radius:14px;height:440px;display:flex;align-items:center;justify-content:center\">\n              <img src=\"c28b3d80-61dd-49da-9fac-a18bcda1572e\" alt=\"Couverture : Un été à s'émerveiller\" style=\"display:block;height:368px;width:auto;border-radius:6px;border:1px solid var(--border-faint);box-shadow:0 16px 32px rgba(101,109,68,0.2)\">\n            <\u002Fdiv>\n            <div>\n              <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Tag\" tone=\"sage\" hint-size=\"150px,26px\">Juillet · disponible<\u002Fx-import>\n              <h2 style=\"font-family:var(--font-display);font-weight:400;font-size:clamp(28px,4.5vw,36px);letter-spacing:0.04em;color:var(--deep-olive);margin:16px 0 8px\">Un été à s'émerveiller<\u002Fh2>\n              <p style=\"font-family:var(--font-body);font-size:15px;font-style:italic;color:var(--rose-deep);margin:0 0 18px\">Un carnet d'activités pour savourer la lumière et la douceur de l'été<\u002Fp>\n              <p style=\"font-family:var(--font-body);font-size:16px;color:var(--ink);font-weight:500;line-height:1.7;max-width:52ch;margin:0 0 14px\">Cet été, laisse-toi un moment rien qu'à toi.<\u002Fp>\n              <p style=\"font-family:var(--font-body);font-size:16px;color:var(--ink-soft);line-height:1.7;max-width:52ch;margin:0 0 14px\">Un été à s'émerveiller réunit, dans un seul carnet, de quoi te poser cinq minutes ou une heure entière : des coloriages inspirés d'un jardin tropical, des mots mêlés, des mots croisés, une grille de sudoku, des messages à décoder, de petites écritures guidées, des listes à remplir à ton rythme.<\u002Fp>\n              <p style=\"font-family:var(--font-body);font-size:16px;color:var(--ink-soft);line-height:1.7;max-width:52ch;margin:0 0 24px\">Aucun ordre à suivre, aucune performance à viser. Ouvre une page, celle qui te parle, et vois ce qui se passe. Les solutions des jeux t'attendent à la fin, si tu en as besoin.<\u002Fp>\n              <sc-if value=\"{{ showPrices }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:22px\">\n                  <span style=\"font-family:var(--font-body);font-size:20px;font-weight:600;color:var(--ink)\">12&nbsp;€<\u002Fspan>\n                  <span style=\"font-family:var(--font-body);font-size:13px;color:var(--ink-faint)\">PDF à imprimer · broché sur Amazon<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"display:flex;gap:12px;align-items:center;flex-wrap:wrap\">\n                <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Button\" variant=\"primary\" size=\"md\" sc-camel-on-click=\"{{ buyEtePdf }}\" hint-size=\"190px,46px\">Télécharger le PDF<\u002Fx-import>\n                <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Button\" variant=\"secondary\" size=\"md\" sc-camel-on-click=\"{{ buyEteAmazon }}\" hint-size=\"230px,46px\">Voir la version brochée sur Amazon<\u002Fx-import>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:76px min(48px,5vw)\">\n          <div style=\"max-width:1080px;margin:0 auto\">\n            <h2 style=\"font-family:var(--font-display);font-weight:400;font-size:28px;letter-spacing:0.04em;color:var(--deep-olive);text-align:center;margin:0 0 44px\">Ce que tu trouveras dedans<\u002Fh2>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:40px\">\n              <div style=\"border-top:1px solid var(--sage);padding-top:20px\">\n                <div style=\"font-family:var(--font-body);font-size:16px;font-weight:500;color:var(--deep-olive);margin-bottom:8px\">Des coloriages<\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.65;margin:0\">Inspirés d'un jardin tropical, au trait fin. Dépasser est permis.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"border-top:1px solid var(--sage);padding-top:20px\">\n                <div style=\"font-family:var(--font-body);font-size:16px;font-weight:500;color:var(--deep-olive);margin-bottom:8px\">Des puzzles et des jeux de mots<\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.65;margin:0\">Mots mêlés, mots croisés, sudoku, messages à décoder. Les solutions t'attendent à la fin.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"border-top:1px solid var(--sage);padding-top:20px\">\n                <div style=\"font-family:var(--font-body);font-size:16px;font-weight:500;color:var(--deep-olive);margin-bottom:8px\">De petites écritures guidées<\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.65;margin:0\">Et des listes à remplir à ton rythme.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:0 min(48px,5vw) 76px;text-align:center\">\n          <p style=\"font-family:var(--font-body);font-size:17px;color:var(--ink-soft);line-height:1.8;max-width:56ch;margin:0 auto 14px\">Une méthode simple traverse ces pages, la méthode pivoine : sept petites permissions, de poser ce que tu portes à t'émerveiller d'un rien.<\u002Fp>\n          <p style=\"font-family:var(--font-body);font-size:17px;color:var(--ink-soft);line-height:1.8;max-width:56ch;margin:0 auto\">C'est un endroit pour respirer, loin des écrans, sans programme à suivre ni résultat à atteindre. Tu peux le garder pour toi, ou l'offrir à une amie qui en a besoin.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"padding:0 min(48px,5vw) 84px\">\n          <div style=\"max-width:1080px;margin:0 auto\">\n            <h3 style=\"font-family:var(--font-display);font-weight:400;font-size:24px;letter-spacing:0.04em;color:var(--deep-olive);text-align:center;margin:0 0 32px\">La suite de la série<\u002Fh3>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:40px;max-width:880px;margin:0 auto\">\n              <div style=\"background:var(--paper);border:1px solid var(--border-faint);border-radius:14px;overflow:hidden\">\n                <div style=\"height:180px;background:var(--blush);display:flex;align-items:center;justify-content:center;opacity:0.8\">\n                  <div style=\"width:130px;min-height:140px;background:var(--paper);border:1px solid var(--border-faint);border-radius:4px;box-shadow:0 10px 20px rgba(101,109,68,0.12);padding:16px 12px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px\">\n                    <div style=\"font-family:var(--font-body);font-size:8px;letter-spacing:0.16em;text-transform:uppercase;color:var(--deep-olive);font-weight:500\">Carnet d'activités<\u002Fdiv>\n                    <div style=\"font-family:var(--font-display);font-size:15px;line-height:1.3;letter-spacing:0.03em;color:var(--deep-olive)\">Récolte d'automne<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"padding:20px 24px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px\">\n                  <div style=\"font-family:var(--font-body);font-size:15px;font-weight:500;color:var(--deep-olive)\">Récolte d'automne<\u002Fdiv>\n                  <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Tag\" tone=\"outline\" hint-size=\"120px,24px\">À venir à l'automne<\u002Fx-import>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:var(--paper);border:1px solid var(--border-faint);border-radius:14px;overflow:hidden\">\n                <div style=\"height:180px;background:var(--blush);display:flex;align-items:center;justify-content:center;opacity:0.8\">\n                  <div style=\"width:130px;min-height:140px;background:var(--paper);border:1px solid var(--border-faint);border-radius:4px;box-shadow:0 10px 20px rgba(101,109,68,0.12);padding:16px 12px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px\">\n                    <div style=\"font-family:var(--font-body);font-size:8px;letter-spacing:0.16em;text-transform:uppercase;color:var(--deep-olive);font-weight:500\">Carnet d'activités<\u002Fdiv>\n                    <div style=\"font-family:var(--font-display);font-size:15px;line-height:1.3;letter-spacing:0.03em;color:var(--deep-olive)\">Noël<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"padding:20px 24px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px\">\n                  <div style=\"font-family:var(--font-body);font-size:15px;font-weight:500;color:var(--deep-olive)\">Noël<\u002Fdiv>\n                  <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Tag\" tone=\"outline\" hint-size=\"130px,24px\">À venir en décembre<\u002Fx-import>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <p style=\"font-family:var(--font-body);font-size:14px;color:var(--ink-faint);text-align:center;margin:28px 0 0\">La newsletter annonce chaque nouveau carnet en premier.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ═══════════ LA MÉTHODE ═══════════ -->\n    <sc-if value=\"{{ isMethode }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"La méthode\">\n\n        <div style=\"padding:clamp(56px,9vw,88px) min(48px,5vw) 56px;text-align:center\">\n          <div class=\"pp-eyebrow\" style=\"margin-bottom:20px\">La méthode pivoine<\u002Fdiv>\n          <h1 style=\"font-family:var(--font-display);font-weight:400;font-size:clamp(30px,5.5vw,42px);line-height:1.16;letter-spacing:0.04em;color:var(--deep-olive);max-width:22ch;margin:0 auto 22px\">Sept petites permissions.<\u002Fh1>\n          <p style=\"font-family:var(--font-body);font-size:clamp(16px,2.4vw,19px);color:var(--ink-soft);line-height:1.7;max-width:46ch;margin:0 auto 40px\">Tu n'as pas d'étapes à suivre, ni d'ordre à respecter. Ce sont des permissions à prendre quand tu en as besoin, une à la fois.<\u002Fp>\n          <div style=\"display:flex;justify-content:center\">\n            <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.PivoineBadge\" variant=\"strip\" hint-size=\"560px,64px\"><\u002Fx-import>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--paper);border-top:1px solid var(--border-faint);border-bottom:1px solid var(--border-faint);padding:72px min(48px,5vw);display:flex;justify-content:center\">\n          <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.LetterBlock\" align=\"center\" signature=\"\" hint-size=\"620px,280px\">\n            <p style=\"margin:0 0 1.2em\">Cette méthode est née à ma table à manger, pendant ma longue pause. Écrire ce qui tournait dans ma tête, remarquer la lumière qui change, colorier un peu, jouer un peu : c'est ce qui m'aidait, un soir après l'autre.<\u002Fp>\n            <p style=\"margin:0\">Je l'ai rangée en sept mots, pour la retrouver facilement. La voici.<\u002Fp>\n            <div style=\"margin-top:22px;font-family:'Allison',cursive;font-size:34px;line-height:1.1;color:var(--rose)\">Camélia<\u002Fdiv>\n          <\u002Fx-import>\n        <\u002Fdiv>\n\n        <div style=\"padding:84px min(48px,5vw)\">\n          <div style=\"max-width:640px;margin:0 auto;display:flex;flex-direction:column;gap:52px\">\n\n            <div style=\"display:flex;gap:28px;align-items:flex-start\">\n              <div style=\"font-family:var(--font-display);font-size:46px;line-height:1;color:var(--rose);width:64px;flex:none;text-align:center\">P<\u002Fdiv>\n              <div>\n                <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:10px;flex-wrap:wrap\">\n                  <span style=\"font-family:var(--font-display);font-size:24px;letter-spacing:0.04em;color:var(--deep-olive)\">Poser<\u002Fspan>\n                  <span style=\"font-family:var(--font-body);font-size:14px;font-style:italic;color:var(--rose-deep)\">déposer ce que tu portes<\u002Fspan>\n                <\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:16px;color:var(--ink-soft);line-height:1.75;margin:0\">Tu poses ton téléphone, le sac de la journée, et tout ce que tu retiens depuis ce matin. Une table, une tasse, une page : ça suffit.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:28px;align-items:flex-start\">\n              <div style=\"font-family:var(--font-display);font-size:46px;line-height:1;color:var(--rose);width:64px;flex:none;text-align:center\">I<\u002Fdiv>\n              <div>\n                <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:10px;flex-wrap:wrap\">\n                  <span style=\"font-family:var(--font-display);font-size:24px;letter-spacing:0.04em;color:var(--deep-olive)\">Intimité<\u002Fspan>\n                  <span style=\"font-family:var(--font-body);font-size:14px;font-style:italic;color:var(--rose-deep)\">rien qu'à toi<\u002Fspan>\n                <\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:16px;color:var(--ink-soft);line-height:1.75;margin:0\">Ce que tu écris ici, personne ne le lira. Tu n'as rien à prouver, rien à montrer. C'est ton endroit.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:28px;align-items:flex-start\">\n              <div style=\"font-family:var(--font-display);font-size:46px;line-height:1;color:var(--rose);width:64px;flex:none;text-align:center\">V<\u002Fdiv>\n              <div>\n                <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:10px;flex-wrap:wrap\">\n                  <span style=\"font-family:var(--font-display);font-size:24px;letter-spacing:0.04em;color:var(--deep-olive)\">Vérité<\u002Fspan>\n                  <span style=\"font-family:var(--font-body);font-size:14px;font-style:italic;color:var(--rose-deep)\">sans te juger<\u002Fspan>\n                <\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:16px;color:var(--ink-soft);line-height:1.75;margin:0\">Tu écris ce que tu ressens vraiment, même quand ce n'est pas joli. Fatiguée, à vif, soulagée : le mot juste suffit.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:28px;align-items:flex-start\">\n              <div style=\"font-family:var(--font-display);font-size:46px;line-height:1;color:var(--rose);width:64px;flex:none;text-align:center\">O<\u002Fdiv>\n              <div>\n                <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:10px;flex-wrap:wrap\">\n                  <span style=\"font-family:var(--font-display);font-size:24px;letter-spacing:0.04em;color:var(--deep-olive)\">Observer<\u002Fspan>\n                  <span style=\"font-family:var(--font-body);font-size:14px;font-style:italic;color:var(--rose-deep)\">les petites choses<\u002Fspan>\n                <\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:16px;color:var(--ink-soft);line-height:1.75;margin:0\">Tu remarques ce qui est là : la lumière qui baisse, le bruit de la rue qui se calme, la couleur de ton thé.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:28px;align-items:flex-start\">\n              <div style=\"font-family:var(--font-display);font-size:46px;line-height:1;color:var(--rose);width:64px;flex:none;text-align:center\">I<\u002Fdiv>\n              <div>\n                <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:10px;flex-wrap:wrap\">\n                  <span style=\"font-family:var(--font-display);font-size:24px;letter-spacing:0.04em;color:var(--deep-olive)\">Imperfection<\u002Fspan>\n                  <span style=\"font-family:var(--font-body);font-size:14px;font-style:italic;color:var(--rose-deep)\">rien à réussir<\u002Fspan>\n                <\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:16px;color:var(--ink-soft);line-height:1.75;margin:0\">Tu peux raturer, dépasser, laisser une page à moitié vide. Hors des lignes, c'est très bien aussi.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:28px;align-items:flex-start\">\n              <div style=\"font-family:var(--font-display);font-size:46px;line-height:1;color:var(--rose);width:64px;flex:none;text-align:center\">N<\u002Fdiv>\n              <div>\n                <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:10px;flex-wrap:wrap\">\n                  <span style=\"font-family:var(--font-display);font-size:24px;letter-spacing:0.04em;color:var(--deep-olive)\">Nature<\u002Fspan>\n                  <span style=\"font-family:var(--font-body);font-size:14px;font-style:italic;color:var(--rose-deep)\">laisser entrer la saison<\u002Fspan>\n                <\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:16px;color:var(--ink-soft);line-height:1.75;margin:0\">Une fleur sur la table, la pluie derrière la vitre, un fruit du marché. C'est déjà la saison qui entre.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:28px;align-items:flex-start\">\n              <div style=\"font-family:var(--font-display);font-size:46px;line-height:1;color:var(--rose);width:64px;flex:none;text-align:center\">E<\u002Fdiv>\n              <div>\n                <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:10px;flex-wrap:wrap\">\n                  <span style=\"font-family:var(--font-display);font-size:24px;letter-spacing:0.04em;color:var(--deep-olive)\">Émerveillement<\u002Fspan>\n                  <span style=\"font-family:var(--font-body);font-size:14px;font-style:italic;color:var(--rose-deep)\">un peu de douceur<\u002Fspan>\n                <\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:16px;color:var(--ink-soft);line-height:1.75;margin:0\">Un détail qui te fait sourire, une couleur que tu aimes, un souvenir simple. C'est petit, et c'est déjà beaucoup.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:0 min(48px,5vw) 84px;text-align:center\">\n          <p style=\"font-family:var(--font-display);font-size:24px;letter-spacing:0.04em;color:var(--deep-olive);margin:0 0 14px\">Jamais une liste à cocher.<\u002Fp>\n          <p style=\"font-family:var(--font-body);font-size:16px;color:var(--ink-soft);line-height:1.7;max-width:44ch;margin:0 auto 28px\">Tu la retrouveras glissée au fil des carnets, une permission à la fois.<\u002Fp>\n          <div style=\"display:flex;gap:12px;justify-content:center;flex-wrap:wrap\">\n            <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Button\" variant=\"soft\" size=\"md\" sc-camel-on-click=\"{{ goEcriture }}\" hint-size=\"220px,46px\">Voir les carnets d'écriture<\u002Fx-import>\n            <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Button\" variant=\"secondary\" size=\"md\" sc-camel-on-click=\"{{ goActivites }}\" hint-size=\"220px,46px\">Voir les carnets d'activités<\u002Fx-import>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ═══════════ À PROPOS ═══════════ -->\n    <sc-if value=\"{{ isApropos }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"À propos\">\n\n        <div style=\"padding:clamp(56px,9vw,88px) min(48px,5vw) 56px;text-align:center\">\n          <div class=\"pp-eyebrow\" style=\"margin-bottom:20px\">À propos<\u002Fdiv>\n          <h1 style=\"font-family:var(--font-display);font-weight:400;font-size:clamp(30px,5.5vw,42px);line-height:1.16;letter-spacing:0.04em;color:var(--deep-olive);margin:0 auto\">Je m'appelle Camélia.<\u002Fh1>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--paper);border-top:1px solid var(--border-faint);border-bottom:1px solid var(--border-faint);padding:84px min(48px,5vw);display:flex;flex-direction:column;align-items:center;gap:48px\">\n          <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.LetterBlock\" signature=\"\" hint-size=\"620px,900px\">\n            <p style=\"margin:0 0 1.3em\">Bonjour. Je suis contente que tu sois là. Papier Pivoine, c'est moi : j'écris les carnets, je compose les pages, je choisis chaque couleur. Camélia est mon nom de plume.<\u002Fp>\n            <p style=\"margin:0 0 1.3em\">Je suis née au Vietnam. J'étais une enfant discrète et silencieuse, souvent seule avec un livre ou un magazine, et très bien comme ça. À 18 ans, je suis arrivée en France pour mes études. J'y vis depuis plus de vingt ans, dans une petite ville calme près de Toulouse.<\u002Fp>\n            <p style=\"margin:0 0 1.3em\">Pendant longtemps, je me suis adaptée. À l'école, au travail, partout. Dans l'open space, je souriais et je faisais ce qu'il fallait. Le soir, tout ce que j'avais retenu dans la journée continuait de tourner dans ma tête, parfois jusqu'à trois heures du matin.<\u002Fp>\n            <p style=\"margin:0 0 1.3em\">En 2023, j'ai traversé une dépression. Je n'en parle pas facilement. Mais c'est cette année-là que j'ai arrêté de faire comme si tout allait bien, et que j'ai commencé à chercher ce qui me faisait du bien, vraiment.<\u002Fp>\n            <p style=\"margin:0 0 1.3em\">Un mot m'a aidée : hypersensible. Je l'ai découvert dans les travaux de la psychologue Elaine Aron. Ce que je prenais pour un défaut avait un nom. Je n'étais pas la seule, et toi non plus.<\u002Fp>\n            <p style=\"margin:0 0 1.3em\">Ce qui m'aide tient en peu de choses. Écrire ce qui pèse, en listes désordonnées ou en longues lettres. Mon thé vert du matin, mes plantes sur le balcon, mon chat Bao qui dort à côté de moi pendant que j'écris.<\u002Fp>\n            <p style=\"margin:0 0 1.3em\">On m'a accompagnée pendant des années, et parler m'a fait du bien. Mais entre deux rendez-vous, j'avais besoin de quelque chose à portée de main, pour les soirs où ça déborde. Alors je l'ai fabriqué, d'abord pour moi. Papier Pivoine est né comme ça.<\u002Fp>\n            <p style=\"margin:0 0 1.3em\">Si tu sens tout très fort et si le monde te fatigue vite, ces carnets sont pensés pour toi. Tu ne verras pas mon visage ici, je suis quelqu'un de discret. Mais dans chaque page, il y a beaucoup de moi.<\u002Fp>\n            <p style=\"margin:0\">Prends soin de toi.<\u002Fp>\n            <div style=\"margin-top:22px;font-family:'Allison',cursive;font-size:34px;line-height:1.1;color:var(--rose)\">Camélia<\u002Fdiv>\n          <\u002Fx-import>\n          <div style=\"display:flex;flex-direction:column;align-items:center;gap:12px\">\n            <img src=\"3f18b883-6722-47ae-9c7a-fffc9436e415\" alt=\"Bao, chat roux et blanc, allongé sur un plaid rose\" style=\"width:180px;height:180px;border-radius:50%;object-fit:cover;border:1px solid var(--border-faint);box-shadow:0 14px 28px rgba(101,109,68,0.16)\">\n            <span style=\"font-family:var(--font-body);font-size:13px;font-style:italic;color:var(--ink-faint)\">Bao, mon collègue d'écriture.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:76px min(48px,5vw) 84px;text-align:center\">\n          <div class=\"pp-eyebrow\" style=\"margin-bottom:14px\">La suite de cette histoire<\u002Fdiv>\n          <p style=\"font-family:var(--font-body);font-size:16px;color:var(--ink-soft);line-height:1.7;max-width:40ch;margin:0 auto 24px\">La méthode pivoine est née de ces soirées-là.<\u002Fp>\n          <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Button\" variant=\"ghost\" size=\"md\" sc-camel-on-click=\"{{ goMethode }}\" hint-size=\"170px,44px\">Lire la méthode<\u002Fx-import>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ═══════════ LA NEWSLETTER ═══════════ -->\n    <sc-if value=\"{{ isNewsl
