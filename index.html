etter }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"La newsletter\">\n\n        <div style=\"padding:clamp(56px,9vw,88px) min(48px,5vw) 64px;text-align:center\">\n          <div class=\"pp-eyebrow\" style=\"margin-bottom:20px\">La newsletter, gratuite<\u002Fdiv>\n          <h1 style=\"font-family:var(--font-display);font-weight:400;font-size:clamp(30px,5.5vw,42px);line-height:1.16;letter-spacing:0.04em;color:var(--deep-olive);max-width:22ch;margin:0 auto 22px\">Une lettre, une fois par mois.<\u002Fh1>\n          <p style=\"font-family:var(--font-body);font-size:clamp(16px,2.4vw,19px);color:var(--ink-soft);line-height:1.7;max-width:46ch;margin:0 auto\">Une lettre douce, envoyée le premier dimanche du mois. C'est gratuit, et tu peux te désinscrire quand tu veux.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--paper);border-top:1px solid var(--border-faint);border-bottom:1px solid var(--border-faint);padding:76px min(48px,5vw)\">\n          <div style=\"max-width:560px;margin:0 auto\">\n            <h2 style=\"font-family:var(--font-display);font-weight:400;font-size:28px;letter-spacing:0.04em;color:var(--deep-olive);text-align:center;margin:0 0 40px\">Dedans, chaque mois<\u002Fh2>\n            <div style=\"display:flex;flex-direction:column\">\n              <div style=\"padding:20px 0;border-top:1px solid var(--border-faint)\">\n                <div style=\"font-family:var(--font-body);font-size:16px;font-weight:500;color:var(--deep-olive);margin-bottom:6px\">Le thème du mois<\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.65;margin:0\">Une saison, une humeur, un fil qui traverse toute la lettre.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"padding:20px 0;border-top:1px solid var(--border-faint)\">\n                <div style=\"font-family:var(--font-body);font-size:16px;font-weight:500;color:var(--deep-olive);margin-bottom:6px\">Mes réflexions personnelles<\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.65;margin:0\">Ce que le mois m'a fait : les jours lourds comme les bons moments.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"padding:20px 0;border-top:1px solid var(--border-faint)\">\n                <div style=\"font-family:var(--font-body);font-size:16px;font-weight:500;color:var(--deep-olive);margin-bottom:6px\">Un exercice d'écriture guidé<\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.65;margin:0\">Une question douce, dix minutes, une page.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"padding:20px 0;border-top:1px solid var(--border-faint);border-bottom:1px solid var(--border-faint)\">\n                <div style=\"font-family:var(--font-body);font-size:16px;font-weight:500;color:var(--deep-olive);margin-bottom:6px\">Mes nouveautés<\u002Fdiv>\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.65;margin:0\">Les carnets qui viennent de sortir, et ce que je prépare.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--blush)\">\n          <div style=\"max-width:720px;margin:0 auto;padding:80px min(48px,5vw);text-align:center\">\n            <div class=\"pp-eyebrow\" style=\"margin-bottom:16px\">Le cadeau de bienvenue<\u002Fdiv>\n            <h2 style=\"font-family:var(--font-display);font-weight:400;font-size:clamp(26px,4.2vw,34px);letter-spacing:0.04em;color:var(--deep-olive);margin:0 0 18px\">Un petit carnet de bienvenue<\u002Fh2>\n            <p style=\"font-family:var(--font-body);font-size:16px;color:var(--ink-soft);line-height:1.7;max-width:50ch;margin:0 auto 30px\">Pour te dire bienvenue, je t'envoie un petit carnet à imprimer : des exercices d'écriture guidés, un coloriage, des puzzles et des jeux, et un petit test de personnalité, juste pour le plaisir.<\u002Fp>\n            <sc-if value=\"{{ notSubscribed }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;justify-content:center\">\n                <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Button\" variant=\"primary\" size=\"lg\" sc-camel-on-click=\"{{ subscribe }}\" hint-size=\"230px,52px\">Recevoir le petit carnet<\u002Fx-import>\n              <\u002Fdiv>\n              <p style=\"font-family:var(--font-body);font-size:12px;color:var(--ink-faint);margin:16px 0 0\">Gratuit. Ton adresse ne sert qu'à la newsletter, rien d'autre.<\u002Fp>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ subscribed }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:var(--paper);border:1px solid var(--border-faint);border-radius:14px;padding:28px 32px;max-width:440px;margin:0 auto\">\n                <p style=\"font-family:var(--font-body);font-size:16px;color:var(--deep-olive);line-height:1.6;margin:0 0 6px\">C'est noté. Ton petit carnet est en route vers ta boîte mail.<\u002Fp>\n                <p style=\"font-family:var(--font-body);font-size:13px;color:var(--ink-faint);margin:0\">Si tu ne la vois pas, regarde dans les courriers indésirables.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:84px min(48px,5vw);display:flex;flex-direction:column;align-items:center\">\n          <div class=\"pp-eyebrow\" style=\"margin-bottom:28px\">Un extrait · Papier Pivoine n° 88, juillet<\u002Fdiv>\n          <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.LetterBlock\" align=\"center\" signature=\"\" hint-size=\"560px,300px\">\n            <p style=\"margin:0 0 1.2em\">Le thème de juillet, c'est l'école buissonnière. Ce petit pincement qu'on a parfois, quand la vie s'est refermée autour du travail et des responsabilités, et qu'une pensée traverse l'esprit sans prévenir : est-ce vraiment tout ?<\u002Fp>\n            <p style=\"margin:0 0 1.2em\">On ne va pas creuser ça sérieusement ce mois-ci. On va plutôt jouer avec l'idée, inventer d'autres vies possibles, sans obligation d'y croire. C'est une pause faite exprès pour rester légère.<\u002Fp>\n            <p style=\"margin:0\">L'exercice de juillet : une carte postale d'une autre vie.<\u002Fp>\n            <div style=\"margin-top:22px;font-family:'Allison',cursive;font-size:34px;line-height:1.1;color:var(--rose)\">Camélia<\u002Fdiv>\n          <\u002Fx-import>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--paper);border-top:1px solid var(--border-faint);padding:76px min(48px,5vw)\">\n          <div style=\"max-width:1080px;margin:0 auto\">\n            <div class=\"pp-eyebrow\" style=\"display:block;text-align:center;margin-bottom:44px\">Elles la reçoivent déjà<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:36px;align-items:start\">\n              <div style=\"border-top:1px solid var(--sage);padding-top:20px\">\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.7;margin:0 0 16px\">Camélia, ta lettre du mardi est devenue un véritable rendez-vous précieux pour moi. Le travail d'écriture que tu proposes m'apporte énormément dans mon quotidien. Grâce à tes exercices j'apprends à me poser, à réfléchir différemment et à mieux comprendre ce que je ressens. J'avance petit à petit, à mon rythme, et je sens une vraie évolution. Merci pour la douceur, la profondeur et la constance que tu mets dans chacun de tes envois. ☺️✨✨<\u002Fp>\n                <div style=\"font-family:var(--font-body);font-size:13px;color:var(--rose-deep)\">- Véronique<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"border-top:1px solid var(--sage);padding-top:20px\">\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.7;margin:0 0 16px\">Merci pour tes newsletters qui sont de réelles bouffées d'air frais. J'aimais déjà écrire et je tenais mon journal de pensée mais là c'est encore mieux avec les sujets que tu abordes. Merci du fond du cœur.<\u002Fp>\n                <div style=\"font-family:var(--font-body);font-size:13px;color:var(--rose-deep)\">- Virginie<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"border-top:1px solid var(--sage);padding-top:20px\">\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.7;margin:0 0 16px\">J'adore vraiment vos mails et vos écrits, j'en ai déjà réalisé plusieurs et avec un retour en arrière sur mes écrits cela m'a permis de réaliser beaucoup de choses.<\u002Fp>\n                <div style=\"font-family:var(--font-body);font-size:13px;color:var(--rose-deep)\">- Nathalie<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ═══════════ LE BLOG · LISTE ═══════════ -->\n    <sc-if value=\"{{ isBlog }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Le blog · liste\">\n\n        <div style=\"padding:clamp(56px,9vw,88px) min(48px,5vw) 56px;text-align:center\">\n          <div class=\"pp-eyebrow\" style=\"margin-bottom:20px\">Le blog<\u002Fdiv>\n          <h1 style=\"font-family:var(--font-display);font-weight:400;font-size:clamp(30px,5.5vw,42px);line-height:1.16;letter-spacing:0.04em;color:var(--deep-olive);max-width:24ch;margin:0 auto 22px\">Des billets, par-ci par-là<\u002Fh1>\n          <p style=\"font-family:var(--font-body);font-size:clamp(16px,2.4vw,19px);color:var(--ink-soft);line-height:1.7;max-width:46ch;margin:0 auto\">J'écris quand j'ai quelque chose à te raconter.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--paper);border-top:1px solid var(--border-faint);border-bottom:1px solid var(--border-faint);padding:76px min(48px,5vw)\">\n          <div style=\"max-width:1080px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:36px;align-items:start\">\n            <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Card\" padded=\"{{ false }}\" interactive=\"{{ true }}\" sc-camel-on-click=\"{{ goArticleEte }}\" hint-size=\"340px,480px\">\n              <img src=\"2fa611b4-e61e-422a-8c59-886fd6d3ab8e\" alt=\"Un été à s'émerveiller\" style=\"display:block;width:100%;height:240px;object-fit:cover\">\n              <div style=\"padding:24px 26px 26px\">\n                <div style=\"font-family:var(--font-body);font-size:12px;color:var(--ink-faint);margin-bottom:10px\">Juillet 2026<\u002Fdiv>\n                <h3 style=\"font-family:var(--font-display);font-weight:400;font-size:22px;line-height:1.3;letter-spacing:0.04em;color:var(--deep-olive);margin:0 0 10px\">Cet été, tu as le droit de t'émerveiller<\u002Fh3>\n                <p style=\"font-family:var(--font-body);font-size:15px;color:var(--ink-soft);line-height:1.65;margin:0 0 14px\">Pourquoi j'ai créé un carnet d'activités pour les femmes hypersensibles et introverties, loin de tout ce qui demande de se réparer.<\u002Fp>\n                <span style=\"font-family:var(--font-body);font-size:14px;color:var(--rose)\">Lire le billet<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fx-import>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ═══════════ LE BLOG · BILLET ═══════════ -->\n    <sc-if value=\"{{ isArticleEte }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Le blog · billet été\">\n\n        <div style=\"padding:clamp(48px,8vw,72px) min(48px,5vw) 56px;text-align:center\">\n          <div style=\"margin-bottom:26px\"><span sc-camel-on-click=\"{{ goBlog }}\" style=\"cursor:pointer;font-family:var(--font-body);font-size:14px;color:var(--rose)\">← Tous les billets<\u002Fspan><\u002Fdiv>\n          <div class=\"pp-eyebrow\" style=\"margin-bottom:20px\">Le blog · juillet 2026<\u002Fdiv>\n          <h1 style=\"font-family:var(--font-display);font-weight:400;font-size:clamp(30px,5.5vw,42px);line-height:1.2;letter-spacing:0.04em;color:var(--deep-olive);max-width:24ch;margin:0 auto 22px\">Cet été, tu as le droit de t'émerveiller<\u002Fh1>\n          <p style=\"font-family:var(--font-body);font-size:clamp(16px,2.4vw,19px);font-style:italic;color:var(--ink-soft);line-height:1.7;max-width:52ch;margin:0 auto\">Pourquoi j'ai créé un carnet d'activités pour les femmes hypersensibles et introverties, loin de tout ce qui demande de se réparer.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--paper);border-top:1px solid var(--border-faint);border-bottom:1px solid var(--border-faint);padding:76px min(48px,5vw)\">\n          <div style=\"max-width:620px;margin:0 auto;font-family:var(--font-body);font-size:17px;color:var(--ink);line-height:1.85\">\n            <p style=\"margin:0 0 1.3em\">Tu rentres, tu poses tes clés, et pendant une seconde, avant même d'allumer une lumière, tu sens tes épaules redescendre.<\u002Fp>\n            <p style=\"margin:0 0 1.3em\">C'est ce moment-là que j'avais envie de capturer : la seconde où, enfin, plus personne ne te regarde, après une journée entière à porter l'énergie de tout le monde sans l'avoir voulu.<\u002Fp>\n            <p style=\"margin:0 0 1.3em\">Si tu es hypersensible et introvertie comme moi, tu sais de quoi je parle : cette fatigue précise qui vient d'avoir capté, toute la journée, ce que les autres n'ont même pas remarqué. Un ton qui change, une lumière qui baisse, un silence de trop.<\u002Fp>\n            <p style=\"margin:0 0 1.3em\">J'ai passé des années à essayer de me corriger : des routines, des méthodes, des livres qui promettaient de me rendre plus forte, plus efficace, moins « trop ». Aucun n'a vraiment tenu ses promesses. Ce que je cherchais, en réalité, c'était un endroit pour poser ce que je portais.<\u002Fp>\n            <p style=\"margin:0 0 1.3em\">C'est exactement ce que je viens de créer : Un été à s'émerveiller, un carnet d'activités pour les femmes hypersensibles et introverties, pensé comme un moment à elles plutôt que comme un programme de plus.<\u002Fp>\n            <div style=\"display:flex;justify-content:center;margin:2.4em 0 1.6em\">\n              <img src=\"b2245263-a867-45ee-80bd-848c5278cd4d\" alt=\"Un été à s'émerveiller, livre broché\" style=\"display:block;width:min(320px,84vw);height:auto\">\n            <\u002Fdiv>\n            <div style=\"display:flex;justify-content:center;margin:0 0 2.6em\">\n              <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Button\" variant=\"primary\" size=\"md\" sc-camel-on-click=\"{{ buyEteAmazon }}\" hint-size=\"340px,46px\"><span style=\"text-align:center\">→ Découvrir <em>Un été à s'émerveiller<\u002Fem> sur Amazon<\u002Fspan><\u002Fx-import>\n            <\u002Fdiv>\n            <h2 style=\"font-family:var(--font-display);font-weight:400;font-size:24px;letter-spacing:0.04em;color:var(--deep-olive);margin:0 0 20px\">Ce que tu trouveras à l'intérieur<\u002Fh2>\n            <p style=\"margin:0 0 1.3em\">Un mélange de coloriages inspirés d'un jardin tropical, de mots à chercher et à croiser, de petites écritures guidées construites en trois questions simples (pour que commencer à écrire ne demande aucun effort), des jeux, des listes à remplir à ton rythme. Sans ordre imposé, avec les solutions incluses à la fin.<\u002Fp>\n            <p style=\"margin:0 0 1.3em\">Rien à réussir ici. Tu ouvres une page, celle qui te parle, et tu vois ce qui se passe.<\u002Fp>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px;margin:2.4em 0 1.6em\">\n              <img src=\"32daad74-02cf-41d2-b7c6-8ede7dc62bdb\" alt=\"Page intérieure : coloriage\" style=\"display:block;width:100%;height:auto;border:1px solid var(--border-faint);border-radius:4px;box-shadow:0 8px 18px rgba(101,109,68,0.12)\">\n              <img src=\"855c01f6-42dc-40a8-9619-1a9931cc66ec\" alt=\"Page intérieure : jeu\" style=\"display:block;width:100%;height:auto;border:1px solid var(--border-faint);border-radius:4px;box-shadow:0 8px 18px rgba(101,109,68,0.12)\">\n              <img src=\"13003f52-a206-435f-83a7-e840b7cc3d62\" alt=\"Page intérieure : jeu\" style=\"display:block;width:100%;height:auto;border:1px solid var(--border-faint);border-radius:4px;box-shadow:0 8px 18px rgba(101,109,68,0.12)\">\n              <img src=\"1b1d653c-898b-416d-be47-5224d367a520\" alt=\"Page intérieure : écriture guidée\" style=\"display:block;width:100%;height:auto;border:1px solid var(--border-faint);border-radius:4px;box-shadow:0 8px 18px rgba(101,109,68,0.12)\">\n            <\u002Fdiv>\n            <div style=\"display:flex;justify-content:center;margin:0 0 2.6em\">\n              <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Button\" variant=\"primary\" size=\"md\" sc-camel-on-click=\"{{ buyEteAmazon }}\" hint-size=\"320px,46px\">→ Voir tout ce qu'il y a dedans, sur Amazon<\u002Fx-import>\n            <\u002Fdiv>\n            <h2 style=\"font-family:var(--font-display);font-weight:400;font-size:24px;letter-spacing:0.04em;color:var(--deep-olive);margin:0 0 20px\">Pourquoi maintenant, pourquoi l'été<\u002Fh2>\n            <p style=\"margin:0 0 1.3em\">La plupart du temps, on parle de nous, les hypersensibles, à travers ce qui est difficile : la surcharge, la fatigue, le besoin de retrait. C'est vrai, et ça mérite d'être dit. Mais la même attention qui capte ce qui pèse capte aussi ce qui est beau, souvent plus que la moyenne des gens. Cet été, j'avais envie de tourner cette attention-là vers autre chose : la lumière, les couleurs, un fruit qui a exactement le bon goût.<\u002Fp>\n            <p style=\"margin:0 0 1.3em\">Ce carnet ne prétend pas résoudre quoi que ce soit. Il ajoute un peu de légèreté à tout ce que tu portes déjà, sans rien retirer.<\u002Fp>\n            <p style=\"margin:0 0 1.3em\">Si cette description te parle, ce carnet est probablement pour toi : un moment qui n'appartient qu'à toi, cet été, sans rien à changer.<\u002Fp>\n            <div style=\"display:flex;justify-content:center;margin:2.2em 0 2.6em\">\n              <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Button\" variant=\"primary\" size=\"md\" sc-camel-on-click=\"{{ buyEteAmazon }}\" hint-size=\"340px,46px\"><span style=\"text-align:center\">→ Se procurer <em>Un été à s'émerveiller<\u002Fem> sur Amazon<\u002Fspan><\u002Fx-import>\n            <\u002Fdiv>\n            <p style=\"margin:0\">Un moment à toi, des pages qui font du bien.<\u002Fp>\n            <div style=\"margin-top:22px;font-family:'Allison',cursive;font-size:34px;line-height:1.1;color:var(--rose)\">Camélia<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ═══════════ BAND (toutes pages sauf newsletter) ═══════════ -->\n    <sc-if value=\"{{ showBand }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"background:var(--blush)\">\n        <div style=\"max-width:720px;margin:0 auto;padding:80px min(48px,5vw);text-align:center\">\n          <h2 style=\"font-family:var(--font-display);font-weight:400;font-size:clamp(26px,4.2vw,34px);letter-spacing:0.04em;color:var(--deep-olive);margin:0 0 18px\">Commence par un cadeau<\u002Fh2>\n          <p style=\"font-family:var(--font-body);font-size:16px;color:var(--ink-soft);line-height:1.7;max-width:52ch;margin:0 auto 30px\">Une fois par mois, je t'écris : le thème de la saison, mes réflexions personnelles, un exercice d'écriture guidé, et des nouvelles de ce que je prépare. Pour t'accueillir, un petit carnet à imprimer : quelques pages d'écriture, un coloriage, des jeux.<\u002Fp>\n          <p style=\"font-family:var(--font-body);font-size:15px;font-style:italic;color:var(--ink-soft);line-height:1.6;max-width:46ch;margin:0 auto 28px\">« Merci pour tes newsletters qui sont de réelles bouffées d'air frais. » · Virginie<\u002Fp>\n          <sc-if value=\"{{ notSubscribed }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;justify-content:center\">\n              <x-import component-from-global-scope=\"PapierPivoineDesignSystem_2e8f20.Button\" variant=\"primary\" size=\"lg\" sc-camel-on-click=\"{{ subscribe }}\" hint-size=\"200px,52px\">Recevoir le cadeau<\u002Fx-import>\n            <\u002Fdiv>\n            <p style=\"font-family:var(--font-body);font-size:12px;color:var(--ink-faint);margin:16px 0 0\">C'est gratuit. Tu peux te désinscrire quand tu veux. <span sc-camel-on-click=\"{{ goNewsletter }}\" style=\"color:var(--rose);cursor:pointer;text-decoration:underline;text-underline-offset:3px\">Voir ce qu'il y a dedans<\u002Fspan><\u002Fp>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ subscribed }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:var(--paper);border:1px solid var(--border-faint);border-radius:14px;padding:28px 32px;max-width:440px;margin:0 auto\">\n              <p style=\"font-family:var(--font-body);font-size:16px;color:var(--deep-olive);line-height:1.6;margin:0 0 6px\">C'est noté. Ton petit carnet est en route vers ta boîte mail.<\u002Fp>\n              <p style=\"font-family:var(--font-body);font-size:13px;color:var(--ink-faint);margin:0\">Si tu ne la vois pas, regarde dans les courriers indésirables.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <a data-formkit-toggle=\"27c8b8373b\" href=\"https://camelianguyen.kit.com/27c8b8373b\" style=\"display:none\" aria-hidden=\"true\">La newsletter<\u002Fa>\n\n  <!-- ═══════════ FOOTER ═══════════ -->\n  <footer style=\"background:var(--paper-warm);border-top:1px solid var(--border-faint);padding:56px min(48px,5vw) 40px\">\n    <div style=\"max-width:1180px;margin:0 auto\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:32px;flex-wrap:wrap\">\n        <div>\n          <div style=\"font-family:var(--font-display);font-size:20px;color:var(--deep-olive);letter-spacing:0.06em;margin-bottom:8px\">Papier Pivoine<\u002Fdiv>\n          <p style=\"font-family:var(--font-body);font-style:italic;color:var(--rose);margin:0;font-size:14px\">Un moment à toi, des pages qui font du bien.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:40px 64px;flex-wrap:wrap\">\n          <div>\n            <div class=\"pp-eyebrow\" style=\"margin-bottom:14px\">La papeterie<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:9px;font-family:var(--font-body);font-size:14px;color:var(--ink-soft)\">\n              <span sc-camel-on-click=\"{{ goEcriture }}\" style=\"cursor:pointer\">Carnets d'écriture<\u002Fspan>\n              <span sc-camel-on-click=\"{{ goActivites }}\" style=\"cursor:pointer\">Carnets d'activités<\u002Fspan>\n              <span sc-camel-on-click=\"{{ goMethode }}\" style=\"cursor:pointer\">La méthode<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div class=\"pp-eyebrow\" style=\"margin-bottom:14px\">Rester en lien<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:9px;font-family:var(--font-body);font-size:14px;color:var(--ink-soft)\">\n              <span sc-camel-on-click=\"{{ goNewsletter }}\" style=\"cursor:pointer\">La newsletter gratuite<\u002Fspan>\n              <span sc-camel-on-click=\"{{ goBlog }}\" style=\"cursor:pointer\">Le blog<\u002Fspan>\n              <a href=\"https://fr.pinterest.com/papierpivoine/\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--ink-soft);text-decoration:none\">Pinterest<\u002Fa>\n              <span sc-camel-on-click=\"{{ goApropos }}\" style=\"cursor:pointer\">À propos<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"height:1px;background:var(--border-faint);margin:36px 0\"><\u002Fdiv>\n      <p style=\"font-family:var(--font-body);font-size:12px;color:var(--ink-faint);margin:0 0 8px;max-width:70ch;line-height:1.6\">Ce que tu trouves ici est une pratique douce, pas un soin. Ce n'est pas un substitut à un accompagnement professionnel. Si tu traverses une période difficile, parles-en à un professionnel de santé.<\u002Fp>\n      <p style=\"font-family:var(--font-body);font-size:12px;color:var(--ink-faint);margin:0\">© 2026 Papier Pivoine · Camélia Nguyen<\u002Fp>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  \n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;pageInitiale&quot;: {\n    &quot;editor&quot;: &quot;enum&quot;,\n    &quot;options&quot;: [&quot;accueil&quot;, &quot;ecriture&quot;, &quot;activites&quot;, &quot;methode&quot;, &quot;apropos&quot;, &quot;newsletter&quot;, &quot;blog&quot;],\n    &quot;default&quot;: &quot;accueil&quot;,\n    &quot;tsType&quot;: &quot;string&quot;,\n    &quot;section&quot;: &quot;Navigation&quot;\n  },\n  &quot;afficherPrix&quot;: {\n    &quot;editor&quot;: &quot;boolean&quot;,\n    &quot;default&quot;: true,\n    &quot;tsType&quot;: &quot;boolean&quot;,\n    &quot;section&quot;: &quot;Contenu&quot;\n  },\n  &quot;kitUrl&quot;: {\n    &quot;editor&quot;: &quot;text&quot;,\n    &quot;default&quot;: &quot;https://www.camelianguyen.fr/papier-pivoine-mensuel&quot;,\n    &quot;tsType&quot;: &quot;string&quot;,\n    &quot;section&quot;: &quot;Newsletter&quot;\n  }\n}\">\nclass Component extends DCLogic {\n  static PAGES = ['accueil', 'ecriture', 'activites', 'methode', 'apropos', 'newsletter', 'blog', 'article-ete'];\n\n  state = {\n    page: (() => {\n      const h = (typeof location !== 'undefined' ? location.hash : '').replace(/^#\\//, '');\n      if (Component.PAGES.includes(h)) return h;\n      return (this.props && this.props.pageInitiale) || 'accueil';\n    })(),\n    email: '',\n    subscribed: false,\n  };\n\n  go(p) {\n    try {\n      if (location.hash === '#/' + p) window.scrollTo(0, 0);\n      else location.hash = '#/' + p;\n    } catch (e) {\n      this.setState({ page: p });\n    }\n  }\n\n  componentDidMount() {\n    this._onHash = () => {\n      const h = location.hash.replace(/^#\\//, '');\n      this.setState({ page: Component.PAGES.includes(h) ? h : 'accueil' });\n      try { window.scrollTo(0, 0); } catch (e) {}\n    };\n    window.addEventListener('hashchange', this._onHash);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('hashchange', this._onHash);\n  }\n\n  renderVals() {\n    const page = this.state.page;\n    const navC = (k) => (page === k ? 'var(--rose)' : 'var(--ink-soft)');\n    const navU = (k) => (page === k ? 'var(--rose)' : 'transparent');\n    return {\n      isAccueil: page === 'accueil',\n      isEcriture: page === 'ecriture',\n      isActivites: page === 'activites',\n      isMethode: page === 'methode',\n      isApropos: page === 'apropos',\n      isNewsletter: page === 'newsletter',\n      isBlog: page === 'blog',\n      isArticleEte: page === 'article-ete',\n      showBand: page !== 'newsletter',\n      showPrices: this.props.afficherPrix ?? true,\n\n      goAccueil: () => this.go('accueil'),\n      goEcriture: () => this.go('ecriture'),\n      goActivites: () => this.go('activites'),\n      goMethode: () => this.go('methode'),\n      goApropos: () => this.go('apropos'),\n      goNewsletter: () => this.go('newsletter'),\n      goBlog: () => this.go('blog'),\n      goArticleEte: () => this.go('article-ete'),\n\n      navCAccueil: navC('accueil'), navUAccueil: navU('accueil'),\n      navCEcriture: navC('ecriture'), navUEcriture: navU('ecriture'),\n      navCActivites: navC('activites'), navUActivites: navU('activites'),\n      navCMethode: navC('methode'), navUMethode: navU('methode'),\n      navCApropos: navC('apropos'), navUApropos: navU('apropos'),\n      navCNewsletter: navC('newsletter'), navUNewsletter: navU('newsletter'),\n      navCBlog: (page === 'blog' || page === 'article-ete') ? 'var(--rose)' : 'var(--ink-soft)',\n      navUBlog: (page === 'blog' || page === 'article-ete') ? 'var(--rose)' : 'transparent',\n\n      email: this.state.email,\n      onEmailChange: (e) => this.setState({ email: e.target.value }),\n      subscribed: this.state.subscribed,\n      notSubscribed: !this.state.subscribed,\n      subscribe: () => {\n        const url = this.props.kitUrl || 'https://www.camelianguyen.fr/papier-pivoine-mensuel';\n        // Sur mobile, la pop-up Kit reste figée et ne défile pas : on ouvre directement la page d'inscription.\n        if (window.matchMedia('(max-width: 700px)').matches) {\n          let w = null;\n          try { w = window.open(url, '_blank', 'noopener'); } catch (e) {}\n          if (!w) { window.location.href = url; }\n          return;\n        }\n        const t = document.querySelector('[data-formkit-toggle=\"27c8b8373b\"]');\n        if (t) { try { t.click(); } catch (e) {} }\n        setTimeout(() => {\n          const kitEls = Array.prototype.slice.call(document.querySelectorAll('[class*=\"formkit\"]'));\n          const visible = kitEls.some((el) => el.offsetWidth > 0 && el.offsetHeight > 0);\n          if (!visible) {\n            try { window.open(url, '_blank', 'noopener'); } catch (e) {}\n          }\n        }, 700);\n      },\n\n      buyTetePdf: () => window.open('https://www.camelianguyen.fr/products/quand-ma-tete-est-pleine?step=checkout', '_blank'),\n      buyTeteAmazon: () => window.open('https://www.amazon.fr/dp/B0H6BCB9VZ', '_blank'),\n      buyEtePdf: () => window.open('https://www.camelianguyen.fr/products/un-ete-a-semerveiller?step=checkout', '_blank'),\n      buyEteAmazon: () => window.open('https://www.amazon.fr/dp/B0H7QKL2GJ', '_blank'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
