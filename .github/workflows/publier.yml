name: Publier le site

# Se déclenche à chaque push sur main (et manuellement depuis l'onglet Actions).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Droits nécessaires pour publier sur GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Une publication à la fois ; on ne coupe pas une publication en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  construire:
    name: Construire et vérifier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Applique les correctifs aux bugs de l'outil de design, dans _site/
      # uniquement. Si une vérification échoue, le script sort en erreur et
      # rien n'est publié : le site en ligne reste sur sa dernière version.
      - name: Appliquer les correctifs
        run: python3 .github/corriger-site.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  publier:
    name: Mettre en ligne
    needs: construire
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploiement.outputs.page_url }}
    steps:
      - id: deploiement
        uses: actions/deploy-pages@v4
